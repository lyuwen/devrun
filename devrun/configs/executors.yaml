# Executor configuration for devrun
# Each key is an executor name referenced in task configs.

local:
  type: local

# Local SLURM (no SSH, sbatch runs on this machine)
slurm:
  type: slurm
  partition: agent
  # python_env: configure the Python environment activated before every job.
  # All fields are optional; combine freely.
  #
  # python_env:
  #   modules: [python/3.11, cuda/12.1]   # HPC: module load ...
  #   venv: /path/to/venv                 # source <venv>/bin/activate
  #   conda: myenv                         # conda activate myenv
  #   conda_path: /opt/conda               # optional: use '. <conda_path>/bin/activate <conda>' when conda isn't on PATH
  #   setup_commands:                      # arbitrary lines run last
  #     - export PYTHONUNBUFFERED=1
  extra:
    # Legacy: setup_commands in extra is still supported but deprecated.
    # Prefer python_env.setup_commands above instead.
    # setup_commands:
    #   - source /path/to/conda/activate
    #   - conda activate myenv
    mem: 32G
    cpus_per_task: 4
    extra_sbatch:
      - --oversubscribe

# Remote SLURM via SSH (template, fill in host/user)
# slurm_remote:
#   type: slurm
#   host: cluster-a.company.com
#   user: dev
#   partition: gpu
#   python_env:
#     modules: [python/3.11, cuda/12.1]
#     conda: myenv
#     conda_path: /opt/conda

ssh_dev:
  type: ssh
  host: dev-server.company.com
  user: dev
  # python_env:
  #   venv: /home/dev/projects/myproject/.venv
  #   setup_commands:
  #     - export PYTHONUNBUFFERED=1

inference_cluster:
  type: http
  endpoint: https://inference.cluster/api
