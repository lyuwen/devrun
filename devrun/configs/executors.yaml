# Executor configuration for devrun
# Each key is an executor name referenced in task configs.

local:
  type: local

# Local SLURM (no SSH, sbatch runs on this machine)
slurm:
  type: slurm
  partition: agent
  extra:
    # Commands run before the main task is executed (e.g. activating environments)
    # setup_commands:
    #   - source /path/to/conda/activate
    #   - conda activate myenv
    mem: 32G
    cpus_per_task: 4
    extra_sbatch:
      - --oversubscribe

# Remote SLURM via SSH (template, fill in host/user)
# slurm_remote:
#   type: slurm
#   host: cluster-a.company.com
#   user: dev
#   partition: gpu

ssh_dev:
  type: ssh
  host: dev-server.company.com
  user: dev
  extra:
    setup_commands:
      - . /path/to/conda/bin/activate
      - conda activate swebench

inference_cluster:
  type: http
  endpoint: https://inference.cluster/api
